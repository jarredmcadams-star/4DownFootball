<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#2a4a2a;font-family:'Courier Prime',monospace;color:#fff;display:flex;justify-content:center;}
#root{width:100%;max-width:520px;padding:10px 8px;}
button{cursor:pointer;font-family:'Courier Prime',monospace;}
input{font-family:'Courier Prime',monospace;}
input[type=range]{accent-color:#f5c518;}
@keyframes kpulse{0%,100%{box-shadow:0 0 0 1px rgba(255,140,0,0.2)}50%{box-shadow:0 0 0 3px rgba(255,140,0,0.75)}}
@keyframes bigFlash{0%{opacity:0;transform:scale(0.72)}16%{opacity:1;transform:scale(1.08)}30%{transform:scale(0.97)}44%{transform:scale(1.03)}58%{transform:scale(1)}84%{opacity:1}100%{opacity:0}}
@keyframes medFlash{0%{opacity:0;transform:scale(0.88)}18%{opacity:1;transform:scale(1)}80%{opacity:1}100%{opacity:0}}
@keyframes fadeFlash{0%{opacity:0}10%{opacity:1}82%{opacity:1}100%{opacity:0}}
@keyframes ellipsis{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}
.cpu-wait::after{content:'';animation:ellipsis 1.2s steps(1) infinite;}

      d: B
    }];
    var perc = [];
    for (var bar = 0; bar < 8; bar++) {
      var bt2 = bar * 4 * B;
      // Kick on every beat
      perc.push({
        t: bt2,
        bd: true
      });
      perc.push({
        t: bt2 + B,
        bd: true
      });
      perc.push({
        t: bt2 + B * 2,
        bd: true
      });
      perc.push({
        t: bt2 + B * 3,
        bd: true
      });
      // Snare pattern: e-16-16 / e-e / >e-e / >q(roll) — same as bed
      perc.push({
        t: bt2,
        sn: true,
        a: true
      });
      perc.push({
        t: bt2 + B * 0.5,
        sn: true
      });
      perc.push({
        t: bt2 + B * 0.75,
        sn: true
      });
      perc.push({
        t: bt2 + B * 1.0,
        sn: true
      });
      perc.push({
        t: bt2 + B * 1.5,
        sn: true
      });
      perc.push({
        t: bt2 + B * 2.0,
        sn: true,
        a: true
      });
      perc.push({
        t: bt2 + B * 2.5,
        sn: true
      });
      // Beat 4 roll
      for (var r = 0; r < 6; r++) perc.push({
        t: bt2 + B * 3.0 + r * (B / 6),
        sn: true,
        a: r === 0
      });
    }
    return {
      lead,
      bass,
      perc,
      totalDur: B * 32
    };
  }

  playMainTheme(loop, skipIntro) {
    if (!this.ctx || !this.musicOn) return;
    if (this._suppressNextTheme) {
      this._suppressNextTheme = false;
      return;
    }
    var mg = this.musicGain;
    var B = 60 / 130;
    var s16 = B / 4;
    var now = this.ctx.currentTime + 0.05;
    // ── Intro bar (1 bar, fades in from silence) ──────────────────────
    if (!skipIntro) {
      // Fade musicGain in over the intro bar
      mg.gain.cancelScheduledValues(now);
      var targetVol = this.muted || !this.musicOn ? 0 : this.musicVol;
      mg.gain.setValueAtTime(targetVol * 0.60, now);
      mg.gain.linearRampToValueAtTime(targetVol, now + 4 * B);
      // Intro melody: G4+C5 hits, then E4+G4, F4+A4
      var self = this;
      var introMel = [{
        u: "G4",
        l: "C5",
        t: 0,
        d: B * 0.45
      },
      // 8th
      {
        u: "G4",
        l: "C5",
        t: B * 0.5,
        d: B * 0.22
      },
      // 16th
      {
        u: "G4",
        l: "C5",
        t: B * 0.75,
        d: B * 0.22
      },
      // 16th
      {
        u: "G4",
        l: "C5",
        t: B * 1.0,
        d: B * 0.45
      },
      // 8th (beat2)
      {
        u: "G4",
        l: "C5",
        t: B * 1.5,
        d: B * 0.45
      },
      // 8th
      {
        u: "G4",
        l: "C5",
        t: B * 2.0,
        d: B * 0.92
      },
      // quarter (beat3)
      {
        u: "E4",
        l: "G4",
        t: B * 3.0,
        d: B * 0.45
      },
      // 8th (beat4)
      {
        u: "F4",
        l: "A4",
        t: B * 3.5,
        d: B * 0.45
      } // 8th — leads into theme
      ];
      introMel.forEach(function (m) {
        self._oscHeld(hz(m.u), now + m.t, m.d, "square", 0.28, mg, true);
        self._oscHeld(hz(m.l), now + m.t, m.d, "square", 0.16, mg, true);
      });
      // Intro snare: 8th+16th+16th / >8th+8th / q-roll / >8th+16th+16th
      var introSnare = [0, B * 0.5, B * 0.75, B * 1.0, B * 1.5, B * 2.0, B * 3.0, B * 3.5, B * 3.75];
      var introRoll = [B * 2.0, B * 2.166, B * 2.333, B * 2.5, B * 2.666, B * 2.833];
      introSnare.forEach(function (t) {
        self.snare(now + t, mg, 0.22);
      });
      introRoll.forEach(function (t) {
        self.snare(now + t, mg, 0.14);
      });
    } // end if(!skipIntro)
    var introDur = skipIntro ? 0 : 4 * B;
    var s = this.getMainScore();
    var t = now + introDur;
    s.lead.forEach(function (m) {
      var fn = m.h ? this._oscHeld.bind(this) : this._osc.bind(this);
      fn(hz(m.u), t, m.d, "square", 0.28, mg, true);
      fn(hz(m.l), t, m.d, "square", 0.14, mg, true);
      t += m.d;
    }.bind(this));
    var bt = now + introDur;
    s.bass.forEach(function (b) {
      this.oscTuba(hz(b.n), bt, b.d * 0.82, 0.20, mg, true);
      bt += b.d;
    }.bind(this));
    s.perc.forEach(function (p) {
      if (p.bd) this.kick(now + introDur + p.t, mg, 0.28);
      if (p.sn) this.snare(now + introDur + p.t, mg, p.a ? 0.22 : 0.12);
    }.bind(this));
    if (loop) {
      this.loopTimeout = setTimeout(function () {
        this.playMainTheme(true, true);
      }.bind(this), (introDur + s.totalDur - 0.04) * 1000);
    }
  }
  playBed(loop) {
    if (!this.ctx || !this.musicOn) return;
    var self = this;
    var mg = this.musicGain;
    var s = this.getBedScore();
    var B = 60 / 120;
    var LOOKAHEAD = B * 16;
    var INTERVAL  = B * 8 * 1000;

    // Build flat event timeline, honouring rests in mel and bass
    var events = [];
    var t = 0;
    s.mel.forEach(function(m) {
      if (!m.r) events.push({type:'mel', time:t, n:m.n, d:m.d});
      t += m.d;
    });
    var bt = 0;
    s.bass.forEach(function(b) {
      if (!b.r) events.push({type:'bass', time:bt, n:b.n, d:b.d, h:b.h});
      bt += b.d;
    });
    s.snare.forEach(function(p) {
      events.push({type:'snare', time:p.t, a:p.a});
    });
    events.sort(function(a,b){ return a.time - b.time; });

    var loopStart = this.ctx.currentTime + 0.05;
    var eventIdx = 0;

    function scheduleChunk() {
      if (!self.ctx || !self.musicOn) return;
      var horizon = self.ctx.currentTime + LOOKAHEAD;
      while (eventIdx < events.length) {
        var ev = events[eventIdx];
        var absTime = loopStart + ev.time;
        if (absTime > horizon) break;
        eventIdx++;
        if (ev.type === 'mel') {
          self.oscFlute(hz(ev.n), absTime, ev.d, 0.15, mg);
        } else if (ev.type === 'bass') {
          self.oscTuba(hz(ev.n), absTime, ev.d * (ev.h ? 0.95 : 0.80), 0.16, mg);
        } else if (ev.type === 'snare') {
          self.snare(absTime, mg, ev.a ? 0.14 : 0.07);
        }
      }
      if (eventIdx < events.length) {
        self.loopTimeout = setTimeout(scheduleChunk, INTERVAL);
      } else if (loop) {
        var remaining = (loopStart + s.totalDur - self.ctx.currentTime - 0.02) * 1000;
        self.loopTimeout = setTimeout(function() {
          self.playBed(true);
        }, remaining);
      }
    }

    scheduleChunk();
  }
